version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nacha-app
    container_name: nacha-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - nacha-network
    environment:
      # Use host.docker.internal or your specific IP to connect to the external MySQL database
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-business_db}
      - DB_USERNAME=${DB_USERNAME:-tanawat}
      - DB_PASSWORD=${DB_PASSWORD:-Noipalee@09}

  web:
    image: nginx:alpine
    container_name: nacha-web
    restart: unless-stopped
    ports:
      - "8015:80"
    volumes:
      - ./:/var/www
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - nacha-network

networks:
  nacha-network:
    driver: bridge
