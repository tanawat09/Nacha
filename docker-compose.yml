version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nacha-app
    container_name: nacha-app
    restart: unless-stopped
    working_dir: /var/www
    networks:
      - nacha-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Connect to the external MySQL database at known IP
      - DB_HOST=${DB_HOST:-192.168.1.10}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-business_db}
      - DB_USERNAME=${DB_USERNAME:-tanawat}
      - DB_PASSWORD=${DB_PASSWORD:-Noipalee@09}

  web:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: nacha-web
    container_name: nacha-web
    restart: unless-stopped
    ports:
      - "8015:80"
    depends_on:
      - app
    networks:
      - nacha-network

networks:
  nacha-network:
    driver: bridge
